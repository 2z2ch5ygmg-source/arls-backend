    <path d="M907 44V180C907 203.196 925.804 222 949 222H1072"
      fill="url(#foldGrad)"/>
    <path d="M907 44V180C907 203.196 925.804 222 949 222H1072"
      stroke="#BFC0C2" stroke-width="5" stroke-linejoin="round"/>
    <!-- inner fold seam -->
    <path d="M904 48V179C904 205.51 925.49 227 952 227H1067" stroke="#D5D6D8" stroke-width="2"/>
  </g>

  <!-- spreadsheet -->
  <g>
    <rect x="546" y="336" width="455" height="394" rx="14" fill="#F7F7F7" stroke="#BFC0C2" stroke-width="5"/>
    <path d="M546 350C546 342.268 552.268 336 560 336H987C994.732 336 1001 342.268 1001 350V420H546V350Z" fill="#107C41"/>
    <path d="M725.5 336V730" stroke="#BFC0C2" stroke-width="5"/>
    <path d="M866.5 336V730" stroke="#BFC0C2" stroke-width="5"/>
    <path d="M546 420.5H1001" stroke="#BFC0C2" stroke-width="5"/>
    <path d="M546 494.5H1001" stroke="#BFC0C2" stroke-width="5"/>
    <path d="M546 571.5H1001" stroke="#BFC0C2" stroke-width="5"/>
    <path d="M546 651.5H1001" stroke="#BFC0C2" stroke-width="5"/>
  </g>

  <!-- excel tile -->
  <g filter="url(#shadowTile)">
    <rect x="401" y="564" width="308" height="303" rx="28" fill="url(#tileGrad)"/>
    <path d="M579 564H709V867H579V564Z" fill="url(#tilePane)"/>
  </g>

  <!-- X -->
  <g filter="url(#shadowX)">
    <path d="M469 635H509.5L538.5 693L575 635H615L561.5 717.5L614 797H575.5L538 738.5L504.5 797H465L518 717.5L469 635Z" fill="#F1F1F1"/>

name: Deploy ARLS Backend (Docker -> ACR -> WebApp)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: acrsecurityopsprod001-eneccucxdcfedqhm.azurecr.io
  IMAGE_REPO: hr-backend
  AZURE_WEBAPP_NAME: rg-arls-backend
  AZURE_RESOURCE_GROUP: rg-arls-dev
  WEBSITES_PORT: "8080"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ACR push는 username/password가 필요함 (ACR 액세스 키에서 가져와 Secret로 저장)
      - name: ACR Login (push)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_PUSH_USERNAME }}
          password: ${{ secrets.ACR_PUSH_PASSWORD }}

      - name: Build & Push (latest)
        run: |
          IMAGE_LATEST=${ACR_LOGIN_SERVER}/${IMAGE_REPO}:latest
          docker build -t "${IMAGE_LATEST}" .
          docker push "${IMAGE_LATEST}"

      # WebApp 배포는 Publish Profile로 처리 (Azure 로그인 불필요)
      - name: Deploy container config to WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:latest

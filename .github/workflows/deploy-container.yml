name: Deploy ARLS Backend (Docker -> ACR -> WebApp)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: acrsecurityopsprod001-eneccucxdcfedqhm.azurecr.io
  IMAGE_REPO: rg-arls-backend
  AZURE_WEBAPP_NAME: rg-arls-backend
  AZURE_RESOURCE_GROUP: rg-shifty-dev
  WEBSITES_PORT: "8080"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Azure 로그인 (OIDC)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2D0BAD1277E54D68AB1AEE8365610001 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6AFAB1BB33A243268F5F062CEB3B4BDB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5430C5FDF1CF4649BA67C8ACAD76CE82 }}

      # ACR 로그인
      - name: ACR Login (push)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_PUSH_USERNAME }}
          password: ${{ secrets.ACR_PUSH_PASSWORD }}

      # Docker build + push
      - name: Build & Push Docker Image
        run: |
          IMAGE_LATEST=${ACR_LOGIN_SERVER}/${IMAGE_REPO}:latest
          IMAGE_SHA=${ACR_LOGIN_SERVER}/${IMAGE_REPO}:${{ github.sha }}

          docker build -t "${IMAGE_LATEST}" -t "${IMAGE_SHA}" .
          docker push "${IMAGE_LATEST}"
          docker push "${IMAGE_SHA}"

      # WebApp 컨테이너 설정
      - name: Configure WebApp Container
        run: |
          az webapp config appsettings set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --settings WEBSITES_PORT="${WEBSITES_PORT}" PORT="${WEBSITES_PORT}"

          az webapp config container set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --container-image-name "${ACR_LOGIN_SERVER}/${IMAGE_REPO}:${{ github.sha }}" \
            --docker-registry-server-url "https://${ACR_LOGIN_SERVER}"

      - name: Restart WebApp
        run: |
          az webapp restart \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}"

      # 헬스체크 (최대 5분 대기)
      - name: Health Check
        run: |
          URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/health"
          echo "Checking health at $URL"

          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            echo "Attempt $i → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy."
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed."
          exit 1

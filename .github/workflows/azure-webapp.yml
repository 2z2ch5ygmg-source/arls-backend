name: Build and deploy arls-backend

on:
  push:
    branches:
      - main

concurrency:
  group: arls-backend-main-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip artifact
        run: |
          rm -f release.zip
          zip -r release.zip . \
            -x ".git/*" ".github/*" ".venv/*" "__pycache__/*" "*.pyc"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2D0BAD1277E54D68AB1AEE8365610001 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6AFAB1BB33A243268F5F062CEB3B4BDB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5430C5FDF1CF4649BA67C8ACAD76CE82 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rg-arls-backend
          slot-name: Production
          package: release.zip
